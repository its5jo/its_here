services:

  # PostgreSQL
  postgres:
    image: postgres:16
    container_name: its-here-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - app-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Spring Blue
  spring-blue:

    # 현재 폴더(Dockerfile)를 이용해서 이미지를 생성
    build: .
    container_name: spring-blue
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: prod,secret
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}

      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESSTOKEN_EXPIRATION: ${JWT_ACCESSTOKEN_EXPIRATION}
      JWT_REFRESHTOKEN_EXPIRATION: ${JWT_REFRESHTOKEN_EXPIRATION}

      GEMINI_API_KEY: ${GEMINI_API_KEY}

    # EC2의 8081 포트 사용
    ports:
      - "8081:8080"

    # DB가 준비된 후 실행
    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - app-network

  # Spring Green
  spring-green:

    build: .
    container_name: spring-green
    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: prod,secret
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}

      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESSTOKEN_EXPIRATION: ${JWT_ACCESSTOKEN_EXPIRATION}
      JWT_REFRESHTOKEN_EXPIRATION: ${JWT_REFRESHTOKEN_EXPIRATION}

      GEMINI_API_KEY: ${GEMINI_API_KEY}

    # EC2의 8082 포트 사용
    ports:
      - "8082:8080"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - app-network

  # Nginx
  nginx:

    image: nginx:latest
    container_name: nginx
    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/service-url.inc:/etc/nginx/conf.d/service-url.inc

    networks:
      - app-network

# Docker Volume
volumes:
  postgres_data:

# Docker Network
networks:
  app-network: